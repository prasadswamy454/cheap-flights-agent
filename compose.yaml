services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cheap_flights}
      POSTGRES_USER: ${POSTGRES_USER:-flights}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5433:5432"
    volumes:
      - flight_locations:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  locations:
    build: .
    command: python -m cheap_flights_agent.import_locations
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-flights}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-cheap_flights}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-flights}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-cheap_flights}
      SERPAPI_API_KEY: ${SERPAPI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
      API_CACHE_TTL_MINUTES: ${API_CACHE_TTL_MINUTES:-360}
      API_DAILY_LIMIT: ${API_DAILY_LIMIT:-75}
      API_MONTHLY_LIMIT: ${API_MONTHLY_LIMIT:-900}
    ports:
      - "8000:8000"
    depends_on:
      locations:
        condition: service_completed_successfully
    restart: unless-stopped

  alerts:
    build: .
    command: python -m cheap_flights_agent.alerts
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-flights}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-cheap_flights}
      SERPAPI_API_KEY: ${SERPAPI_API_KEY}
      ALERT_CHECK_INTERVAL_MINUTES: ${ALERT_CHECK_INTERVAL_MINUTES:-360}
      API_CACHE_TTL_MINUTES: ${API_CACHE_TTL_MINUTES:-360}
      API_DAILY_LIMIT: ${API_DAILY_LIMIT:-75}
      API_MONTHLY_LIMIT: ${API_MONTHLY_LIMIT:-900}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
    depends_on:
      locations:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  flight_locations:
